<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Sora:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>NIQS — Nigerian Institute of Quantity Surveyors</title>

    <!-- Favicon / browser tab & taskbar icon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/NIQS-LOGO-PNG-NAV.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/NIQS-LOGO-PNG-NAV.png" />
    <link rel="apple-touch-icon" href="/NIQS-LOGO-PNG-NAV.png" />
    <link rel="shortcut icon" href="/NIQS-LOGO-PNG-NAV.png" />

    <!-- Browser chrome colour (tab bar on mobile) -->
    <meta name="theme-color" content="#0B1F4B" />

    <!-- SEO -->
    <meta name="description" content="The Nigerian Institute of Quantity Surveyors — Nigeria's professional construction cost managers since 1969. Committed to sustainable national development." />

    <!-- Open Graph — link preview on WhatsApp, Twitter, LinkedIn etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NIQS" />
    <meta property="og:title" content="NIQS — Nigerian Institute of Quantity Surveyors" />
    <meta property="og:description" content="Nigeria's professional construction cost managers since 1969. Connecting 10,000+ members across 37 state chapters." />
    <meta property="og:image" content="https://niqs-website.vercel.app/NIQS-LOGO-PNG-NAV.png" />
    <meta property="og:image:alt" content="NIQS Logo" />
    <meta property="og:url" content="https://niqs-website.vercel.app" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="NIQS — Nigerian Institute of Quantity Surveyors" />
    <meta name="twitter:description" content="Nigeria's professional construction cost managers since 1969." />
    <meta name="twitter:image" content="https://niqs-website.vercel.app/NIQS-LOGO-PNG-NAV.png" />
  </head>
  <body>
    <!-- NIQS branded preloader — visible until React mounts (removed in main.jsx) -->
    <style>
      #niqs-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #0B1F4B;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; transition: opacity .45s ease;
      }
      #niqs-splash.done { opacity: 0; pointer-events: none; }
      .niqs-splash-badge { position: relative; width: 108px; height: 108px; }
      .niqs-splash-badge img {
        position: absolute; inset: 18px; width: 72px; height: 72px;
        object-fit: contain; animation: niqs-breathe 2.2s ease-in-out infinite;
      }
      .niqs-splash-ring {
        position: absolute; inset: 0; border-radius: 50%;
        border: 3px solid rgba(201,151,74,.18);
        border-top-color: #C9974A;
        animation: niqs-spin 1s linear infinite;
      }
      .niqs-splash-name {
        font-family: 'Bricolage Grotesque', sans-serif;
        color: #fff; font-weight: 800; font-size: 15px;
        letter-spacing: .22em; text-transform: uppercase; text-align: center;
        line-height: 1.7; padding: 0 24px;
      }
      .niqs-splash-name em { font-style: normal; color: #C9974A; }
      .niqs-splash-bar {
        width: 140px; height: 2px; border-radius: 2px; overflow: hidden;
        background: rgba(255,255,255,.12); position: relative;
      }
      .niqs-splash-bar::after {
        content: ''; position: absolute; top: 0; left: -40%; width: 40%; height: 100%;
        background: #C9974A; animation: niqs-slide 1.1s ease-in-out infinite;
      }
      @keyframes niqs-spin { to { transform: rotate(360deg); } }
      @keyframes niqs-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.07); } }
      @keyframes niqs-slide { to { left: 100%; } }
    </style>
    <div id="niqs-splash" aria-hidden="true">
      <div class="niqs-splash-badge">
        <div class="niqs-splash-ring"></div>
        <img src="/NIQS-LOGO-PNG-NAV.png" alt="" />
      </div>
      <div class="niqs-splash-name">Nigerian Institute of<br /><em>Quantity Surveyors</em></div>
      <div class="niqs-splash-bar"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
